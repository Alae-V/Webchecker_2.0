spring.application.name=WebChecker_2

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/webcheckerdb
spring.datasource.username=root
spring.datasource.password=root

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Mail (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=deine-email@gmail.com
spring.mail.password=dein-app-passwort
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.com.example.webchecker=DEBUG
logging.level.org.springframework.web=INFO
logging.file.name=logs/webchecker.log